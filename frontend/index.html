<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskr — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a;
      --text: #f0ede8; --muted: #7a7672; --accent: #e8d44d;
      --danger: #e85d5d; --success: #5de8a0;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.03em; margin-bottom: 40px; }
    .logo span { color: var(--accent); }
    .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 36px; width: 100%; max-width: 400px; }
    .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1.5px solid var(--border); }
    .tab { flex: 1; padding: 10px; font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; background: none; border: none; color: var(--muted); cursor: pointer; transition: color 0.15s; padding-bottom: 12px; border-bottom: 2px solid transparent; margin-bottom: -1.5px; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .form { display: flex; flex-direction: column; gap: 14px; }
    .form[hidden] { display: none; }
    label { font-size: 0.78rem; color: var(--muted); font-family: 'Syne', sans-serif; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 6px; }
    input { width: 100%; background: #111; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--accent); }
    .btn { width: 100%; padding: 13px; background: var(--accent); color: #0e0e0e; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; margin-top: 6px; transition: background 0.15s, transform 0.1s; }
    .btn:hover { background: #c9b835; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 0.82rem; padding: 10px 14px; border-radius: 8px; margin-top: 4px; display: none; }
    .msg.error { background: rgba(232,93,93,0.1); color: var(--danger); display: block; }
    .msg.success { background: rgba(93,232,160,0.1); color: var(--success); display: block; }
  </style>
</head>
<body>
  <div class="logo">✦ <span>Taskr</span></div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <form class="form" id="login-form" onsubmit="handleLogin(event)">
      <div>
        <label for="l-username">Username</label>
        <input id="l-username" type="text" autocomplete="username" required/>
      </div>
      <div>
        <label for="l-password">Password</label>
        <input id="l-password" type="password" autocomplete="current-password" required/>
      </div>
      <div id="login-msg" class="msg"></div>
      <button class="btn" type="submit" id="login-btn">Login</button>
    </form>

    <!-- Register -->
    <form class="form" id="register-form" hidden onsubmit="handleRegister(event)">
      <div>
        <label for="r-email">Email</label>
        <input id="r-email" type="email" autocomplete="email" required/>
      </div>
      <div>
        <label for="r-username">Username</label>
        <input id="r-username" type="text" autocomplete="username" required/>
      </div>
      <div>
        <label for="r-password">Password</label>
        <input id="r-password" type="password" autocomplete="new-password" required/>
        <div style="font-size:0.72rem;color:var(--muted);margin-top:5px;">Min 8 chars, 1 uppercase, 1 number</div>
      </div>
      <div id="register-msg" class="msg"></div>
      <button class="btn" type="submit" id="register-btn">Create Account</button>
    </form>
  </div>

  <script>
    const API = '/api/v1';

    // Redirect if already logged in
    if (localStorage.getItem('access_token')) {
      window.location.href = '/static/dashboard.html';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('login-form').hidden = tab !== 'login';
      document.getElementById('register-form').hidden = tab !== 'register';
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type}`;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      const username = document.getElementById('l-username').value.trim();
      const password = document.getElementById('l-password').value;

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed.');

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        window.location.href = '/static/dashboard.html';
      } catch (err) {
        showMsg('login-msg', err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating…';

      const email    = document.getElementById('r-email').value.trim();
      const username = document.getElementById('r-username').value.trim();
      const password = document.getElementById('r-password').value;

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, username, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          // Handle pydantic validation errors
          const detail = Array.isArray(data.detail)
            ? data.detail.map(e => e.msg).join(' ')
            : data.detail;
          throw new Error(detail || 'Registration failed.');
        }
        showMsg('register-msg', 'Account created! You can now log in.', 'success');
        setTimeout(() => switchTab('login'), 1500);
      } catch (err) {
        showMsg('register-msg', err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
